<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Layout com Menu Colapsável</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      /* Transição suave do aside */
      #asideCol {
        transition: all 0.3s ease;
        overflow: visible; /* importante! para deixar o botão "sair" */
        position: relative;
      }

      #asideCol.collapsed {
        width: 0 !important;
        padding: 0 !important;
        border: none !important;
      }

      /* Botão como aba lateral versão desktop) */
      #toggleMenu {
        position: absolute;
        top: 0.5rem;
        right: -4.5rem; /* puxa para fora do aside */
        z-index: 10;
        white-space: nowrap;
      }

      @media (max-width: 767.98px) {
        #toggleMenu {
          position: static;      
          display: block;
          margin-right: auto;    /* encosta à esquerda */
          margin-bottom: 0.5rem; /* espaço em baixo */
      }
    }


    </style>
  </head>
  <body class="d-flex flex-column min-vh-100">

    <!-- HEADER -->
    <header class="bg-primary text-white p-3">
      <h1 class="h4 mb-0">Exemplo com Aside Colapsável</h1>
    </header>

    <!-- CONTEÚDO -->
    <div class="container-fluid flex-grow-1">
      <div class="row h-100">

        <!-- ASIDE -->
        <aside id="asideCol" class="col-12 col-md-4 col-lg-3 bg-light border-end">
          <nav aria-label="menu principal do AMS" class="h-100 p-3">
            <button id="toggleMenu" aria-controls="menu-ams" aria-expanded="true" class="btn btn-outline-secondary btn-sm" aria-label="menu do AMS aberto. pressione se pretender fechar">
              ◀ Menu
            </button>

            <ul id="menu-ams" aria-label="opções AMS" class="list-unstyled mt-4">
              <li><a href="#">Item 1</a></li>
              <li><a href="#">Item 2</a></li>
              <li><a href="#">Item 3</a></li>
            </ul>
          </nav>
        </aside>

        <!-- MAIN -->
        <main class="col bg-white p-4 mt-4">
          <h2>Conteúdo principal</h2>
          <p>
            O menu lateral pode ser colapsado.  
            Quando o menu fecha, o conteúdo principal ocupa todo o espaço disponível.
          </p>
        </main>

      </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-3 mt-auto">
      <p class="mb-0">© 2025 Exemplo</p>
    </footer>

    <script>
      const btn = document.getElementById("toggleMenu");
const aside = document.getElementById("asideCol");
const menu = document.getElementById("menu-ams");

btn.addEventListener("click", () => {
  const expanded = btn.getAttribute("aria-expanded") === "true";

  // alterna estado
  btn.setAttribute("aria-expanded", String(!expanded));
  aside.classList.toggle("collapsed", expanded);
  menu.hidden = expanded;

  // alterna texto visual do botão
  btn.textContent = expanded ? "Menu ▶" : "◀ Menu";

  // alterna aria-label para acessibilidade
  btn.setAttribute(
    "aria-label",
    expanded
      ? "menu do AMS fechado. pressione se pretender abrir"
      : "menu do AMS aberto. pressione se pretender fechar"
  );
});
    </script>
  </body>
</html>
